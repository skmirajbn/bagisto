services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bagisto_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      # - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports: 
      - 8000:80
    networks:
      - bagisto_network
    depends_on:
      - mysql
  mysql:
    image: mysql:8.0
    container_name: bagisto_db
    restart: unless-stopped
    command: --log_bin_trust_function_creators=1
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-bagisto}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-bagisto}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
      
    volumes:
      - bagisto_db_data:/var/lib/mysql
    networks:
      - bagisto_network
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: bagisto_phpmyadmin
    restart: unless-stopped
    ports:
      - 8080:80
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${DB_USERNAME:-bagisto}
      PMA_PASSWORD: ${DB_PASSWORD:-bagisto}
    depends_on:
      - mysql
    networks:
      - bagisto_network

networks:
  bagisto_network:

volumes:
  bagisto_db_data:
